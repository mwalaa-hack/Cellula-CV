<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Water Segmentation</title>
    <style>
        body { font-family: Arial; text-align:center; padding:30px; }
        h1 { color: #1E90FF; }
        img { max-width: 300px; margin:10px; border:1px solid #ddd; border-radius:5px; }
        input[type=file] { margin:20px 0; }
        button { padding:10px 20px; font-size:16px; background-color:#1E90FF; color:white; border:none; border-radius:5px; cursor:pointer; }
        button:hover { background-color:#104E8B; }
    </style>
</head>
<body>
    <h1>Water Segmentation</h1>

    <img src="{{ url_for('static', filename='banner.jpg') }}" alt="Banner Image">

    <form action="/predict" method="post" enctype="multipart/form-data">
        <input type="file" name="image" accept="image/*" required>
        <br>
        <button type="submit">Upload & Predict</button>
    </form>

    {% if uploaded_image %}
        <h2>Uploaded Image</h2>
        <img src="{{ url_for('static', filename='uploads/' + uploaded_image) }}" alt="Uploaded Image">

        <h2>Predicted Mask</h2>
        <img src="{{ url_for('static', filename='uploads/' + mask_image) }}" alt="Mask Image">
    {% endif %}
</body>
</html>
